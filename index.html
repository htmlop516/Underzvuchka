<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Undertale Voice Generator — свой звук на каждую букву</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', 'Determination Mono', monospace;
            margin: 0;
            padding: 20px;
        }
        .game-window {
            background: #000000;
            border-radius: 20px;
            padding: 20px;
            border: 4px solid #ffffff;
            box-shadow: 0 0 0 8px #000000, 0 0 0 12px #ffd966;
        }
        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
            background: #000000;
            box-shadow: inset 0 0 0 2px #f0e6a0, 0 0 0 4px #2c2b26;
        }
        .textbox-area {
            background: #000000;
            border: 3px solid #ffffff;
            padding: 16px;
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000000;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        button, .file-btn {
            background: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.05s linear;
        }
        button:active, .file-btn:active {
            transform: translate(2px, 2px);
            background: #333333;
        }
        input, textarea {
            background: #111111;
            border: 2px solid #ffffff;
            color: #ffffaa;
            font-family: monospace;
            font-size: 16px;
            padding: 10px;
        }
        .status {
            background: #000000aa;
            color: #aaffdd;
            padding: 8px;
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
            border: 1px solid #ffffff66;
        }
        .pixel-corner {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            color: #ffcc88;
        }
    </style>
</head>
<body>
<div>
    <div class="game-window">
        <canvas id="gameCanvas" width="400" height="400" style="width:400px; height:400px; image-rendering: pixelated;"></canvas>
        
        <div class="textbox-area" id="textDisplay">
            ▶ ЗАГРУЗИ ПЕРСОНАЖА И ЗВУК
        </div>

        <div class="controls">
            <label class="file-btn">📁 ПЕРСОНАЖ
                <input type="file" id="charUpload" accept="image/png, image/gif, image/bmp" style="display:none;">
            </label>
            <label class="file-btn">🔊 ЗВУК (WAV)
                <input type="file" id="soundUpload" accept="audio/wav, audio/mpeg" style="display:none;">
            </label>
            <textarea id="talkInput" rows="2" cols="25" placeholder="ВВЕДИ ТЕКСТ..."></textarea>
            <button id="speakBtn">🗣️ ОЗВУЧИТЬ</button>
            <button id="stopBtn">⏹️ СТОП</button>
        </div>
        <div class="status" id="statusMsg">
            🎮 ЗАГРУЗИ КАРТИНКУ → ЗАГРУЗИ ЗВУК (WAV/MP3) → НАПИШИ ТЕКСТ
        </div>
        <div class="pixel-corner">
            ⚡ КАЖДАЯ БУКВА = ТВОЙ ЗВУК ⚡ ПРОБЕЛЫ = ПАУЗА
        </div>
    </div>
</div>

<script>
    (function() {
        // -------- ЭЛЕМЕНТЫ --------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const textDisplay = document.getElementById('textDisplay');
        const statusDiv = document.getElementById('statusMsg');
        
        // -------- ПЕРЕМЕННЫЕ --------
        let characterImg = null;        // Картинка персонажа
        let voiceAudio = null;          // Загруженный звук (WAV)
        let currentPlaying = false;
        let currentTimeouts = [];
        
        // -------- ОТРИСОВКА ПЕРСОНАЖА + РАМКА (ПИКСЕЛЬНАЯ) --------
        function drawPixelFrame() {
            ctx.clearRect(0, 0, 400, 400);
            // Чёрный фон
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 400, 400);
            
            // Рисуем персонажа (если есть)
            if(characterImg) {
                let w = characterImg.width;
                let h = characterImg.height;
                let scale = Math.min(340 / w, 340 / h);
                let drawW = w * scale;
                let drawH = h * scale;
                let dx = (400 - drawW) / 2;
                let dy = (400 - drawH) / 2;
                ctx.drawImage(characterImg, dx, dy, drawW, drawH);
            } else {
                ctx.font = "bold 24px 'Courier New'";
                ctx.fillStyle = "#aaaaaa";
                ctx.fillText("? ПЕРСОНАЖ ?", 120, 210);
            }
            
            // ПИКСЕЛЬНАЯ РАМКА СТИЛЬ UNDERTALE (белая внешняя + жёлтая внутренняя)
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 6;
            ctx.strokeRect(6, 6, 388, 388);
            ctx.strokeStyle = '#f0d050';
            ctx.lineWidth = 4;
            ctx.strokeRect(14, 14, 372, 372);
            for(let i=0;i<4;i++) {
                ctx.fillStyle = '#ffffaa';
                ctx.fillRect(18 + (i%2)*360, 18 + Math.floor(i/2)*360, 12, 12);
            }
        }
        
        // Обновить канвас
        function redrawCanvas() {
            drawPixelFrame();
        }
        
        // -------- ЗАГРУЗКА ПЕРСОНАЖА --------
        const charInput = document.getElementById('charUpload');
        const fakeCharBtn = document.querySelector('label[for="charUpload"]') || document.querySelector('.file-btn');
        document.querySelectorAll('.file-btn').forEach(btn => {
            const input = btn.querySelector('input');
            if(input) {
                input.addEventListener('change', (e) => {
                    if(input.id === 'charUpload' && e.target.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = new Image();
                            img.onload = () => {
                                characterImg = img;
                                redrawCanvas();
                                statusDiv.innerHTML = '✅ ПЕРСОНАЖ ЗАГРУЖЕН! ТЕПЕРЬ ЗАГРУЗИ ЗВУК.';
                            };
                            img.src = ev.target.result;
                        };
                        reader.readAsDataURL(e.target.files[0]);
                    } else if(input.id === 'soundUpload' && e.target.files[0]) {
                        const file = e.target.files[0];
                        const url = URL.createObjectURL(file);
                        voiceAudio = new Audio(url);
                        statusDiv.innerHTML = `🔊 ЗВУК ЗАГРУЖЕН: ${file.name} (БУДЕТ ИГРАТЬ НА КАЖДУЮ БУКВУ)`;
                    }
                });
            }
        });
        
        // -------- ОЗВУЧКА НА КАЖДУЮ БУКВУ --------
        function playSoundOnLetter() {
            if(!voiceAudio) {
                statusDiv.innerHTML = '❌ СНАЧАЛА ЗАГРУЗИ ЗВУК! (WAV/MP3)';
                return false;
            }
            try {
                // Клонируем звук, чтобы можно было играть одновременно
                const soundClone = new Audio(voiceAudio.src);
                soundClone.volume = 1.0;
                soundClone.play().catch(e => console.log("audio play blocked", e));
            } catch(e) {
                // fallback: перезапускаем оригинал
                voiceAudio.currentTime = 0;
                voiceAudio.play().catch(e => console.log("play error", e));
            }
            return true;
        }
        
        function stopAllSpeech() {
            currentTimeouts.forEach(t => clearTimeout(t));
            currentTimeouts = [];
            currentPlaying = false;
            statusDiv.innerHTML = '⏹️ ОСТАНОВЛЕНО.';
        }
        
        function speakLetterByLetter(text) {
            if(!voiceAudio) {
                statusDiv.innerHTML = '❌ НЕТ ЗВУКА! ЗАГРУЗИ WAV ФАЙЛ.';
                return;
            }
            if(!characterImg) {
                statusDiv.innerHTML = '⚠️ ЗАГРУЗИ ПЕРСОНАЖА ДЛЯ ПОЛНОГО ЭФФЕКТА.';
            }
            stopAllSpeech();
            currentPlaying = true;
            textDisplay.innerText = text;
            
            let delay = 0;
            const baseDelay = 130; // миллисекунд на символ (как в Undertale)
            
            for(let i = 0; i < text.length; i++) {
                const ch = text[i];
                if(ch === ' ' || ch === '.' || ch === ',' || ch === '!' || ch === '?') {
                    // Пауза (звук не играет, но текст идёт)
                    delay += baseDelay * 1.2;
                    continue;
                }
                // Для каждой буквы — проигрываем загруженный звук
                const timeoutId = setTimeout(() => {
                    if(currentPlaying) {
                        playSoundOnLetter();
                        // Мини-анимация рта (мелькание)
                        drawPixelFrame();
                        setTimeout(() => redrawCanvas(), 50);
                    }
                }, delay);
                currentTimeouts.push(timeoutId);
                delay += baseDelay;
            }
            
            // По окончании всей фразы
            const endTimeout = setTimeout(() => {
                currentPlaying = false;
                statusDiv.innerHTML = '✅ ГОТОВО! МОЖНО СНОВА.';
                textDisplay.innerText = text;
                redrawCanvas();
            }, delay + 200);
            currentTimeouts.push(endTimeout);
            statusDiv.innerHTML = '🔊 ИГРАЕТ: КАЖДАЯ БУКВА = ТВОЙ ЗВУК!';
        }
        
        // -------- ПОДКЛЮЧЕНИЕ КНОПОК --------
        document.getElementById('speakBtn').addEventListener('click', () => {
            const rawText = document.getElementById('talkInput').value;
            if(!rawText.trim()) {
                statusDiv.innerHTML = '✏️ ВВЕДИ ТЕКСТ!';
                return;
            }
            speakLetterByLetter(rawText);
        });
        
        document.getElementById('stopBtn').addEventListener('click', () => {
            stopAllSpeech();
            redrawCanvas();
        });
        
        // Перерисовка начальная
        redrawCanvas();
        
        // Обход для кнопки загрузки звука и картинки
        document.getElementById('charUpload')?.addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('soundUpload')?.addEventListener('click', (e) => e.stopPropagation());
        const soundInput = document.getElementById('soundUpload');
        const charInputElem = document.getElementById('charUpload');
        document.querySelectorAll('.file-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const inp = btn.querySelector('input');
                if(inp) inp.click();
            });
        });
    })();
</script>
</body>
</html>
