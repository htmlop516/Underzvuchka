<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>UNDERTALE STYLE — СВОЙ ЗВУК НА КАЖДУЮ БУКВУ</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'MS Gothic', monospace;
            padding: 20px;
        }

        /* Главный блок — как на твоём фото */
        .undertale-box {
            background: #000000;
            border: 4px solid #ffffff;
            padding: 12px;
            display: inline-block;
            box-shadow: 8px 8px 0px #3a3a3a;
        }

        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
            background: #000000;
            border: 2px solid #ffffff;
        }

        /* Текстовое поле как в игре */
        .dialogue-box {
            background: #000000;
            border: 3px solid #ffffff;
            padding: 16px 20px;
            margin-top: 20px;
            width: 100%;
            min-width: 400px;
        }

        .dialogue-text {
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            word-break: break-word;
            line-height: 1.4;
            text-shadow: none;
            margin: 0;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: #111;
            padding: 15px;
            border: 2px solid white;
        }

        button, .file-label {
            background: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 8px 18px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }

        button:active, .file-label:active {
            transform: translate(2px, 2px);
            background: #222;
        }

        input, textarea {
            background: #111;
            border: 2px solid #fff;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            padding: 8px;
        }

        textarea {
            width: 260px;
            background: black;
            color: #ffffaa;
            font-size: 16px;
        }

        .status {
            background: black;
            border: 1px solid #ffff99;
            color: #ffff99;
            padding: 8px;
            margin-top: 15px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }

        .speed-slider {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #000;
            padding: 5px 12px;
            border: 1px solid white;
        }
    </style>
</head>
<body>
<div>
    <div class="undertale-box">
        <!-- Канвас для персонажа -->
        <canvas id="characterCanvas" width="380" height="380" style="width:380px; height:380px;"></canvas>

        <!-- Текстовая область как в Undertale -->
        <div class="dialogue-box">
            <div class="dialogue-text" id="dialogueText">
                ▶ ЗАГРУЗИ ПЕРСОНАЖА И ЗВУК
            </div>
        </div>

        <!-- Панель управления -->
        <div class="controls">
            <label class="file-label">
                📁 ПЕРСОНАЖ
                <input type="file" id="charUpload" accept="image/png, image/jpeg, image/gif, image/bmp" style="display:none;">
            </label>
            <label class="file-label">
                🔊 ТВОЙ ЗВУК (WAV/MP3/OGG)
                <input type="file" id="soundUpload" accept="audio/*" style="display:none;">
            </label>
            <textarea id="talkInput" rows="2" cols="22" placeholder="ВВЕДИ ТЕКСТ..."></textarea>
            <button id="speakBtn">🗣️ ОЗВУЧИТЬ</button>
            <button id="stopBtn">⏹️ СТОП</button>
        </div>

        <!-- Регулировка скорости -->
        <div class="speed-slider">
            <span style="color:white;">⚡ СКОРОСТЬ БУКВ:</span>
            <input type="range" id="speedRange" min="60" max="250" value="130" step="5">
            <span id="speedValue" style="color:#ffcc00;">130 мс</span>
        </div>

        <div class="status" id="statusMsg">
            💾 1. ЗАГРУЗИ КАРТИНКУ → 2. ЗАГРУЗИ ЗВУК → 3. НАПИШИ ТЕКСТ → ОЗВУЧИТЬ
        </div>
    </div>
</div>

<script>
    (function() {
        // ------ ЭЛЕМЕНТЫ ------
        const canvas = document.getElementById('characterCanvas');
        const ctx = canvas.getContext('2d');
        const dialogueDiv = document.getElementById('dialogueText');
        const statusSpan = document.getElementById('statusMsg');
        
        // ------ ПЕРЕМЕННЫЕ ------
        let characterImg = null;        // картинка персонажа
        let voiceBlobUrl = null;        // URL загруженного звука
        let currentAudio = null;
        let activeTimeouts = [];
        let isPlaying = false;
        let currentSpeed = 130;          // мс на букву
        
        // ------ ОТРИСОВКА (ТОЛЬКО ПЕРСОНАЖ + РАМКА) ------
        function redrawCanvas() {
            ctx.clearRect(0, 0, 380, 380);
            // чёрный фон
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 380, 380);
            
            if(characterImg) {
                let w = characterImg.width;
                let h = characterImg.height;
                let scale = Math.min(340 / w, 340 / h);
                let drawW = w * scale;
                let drawH = h * scale;
                let dx = (380 - drawW) / 2;
                let dy = (380 - drawH) / 2;
                ctx.drawImage(characterImg, dx, dy, drawW, drawH);
            } else {
                ctx.font = "bold 20px 'Courier New'";
                ctx.fillStyle = "#888888";
                ctx.fillText("? ПЕРСОНАЖ ?", 120, 200);
            }
            
            // РИСУЕМ СТРОГУЮ РАМКУ КАК В UNDERTALE
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(6, 6, 368, 368);
            ctx.beginPath();
            ctx.moveTo(12, 12);
            ctx.lineTo(368, 12);
            ctx.lineTo(368, 368);
            ctx.lineTo(12, 368);
            ctx.closePath();
            ctx.strokeStyle = '#aaaaaa';
            ctx.stroke();
        }
        
        // ------ ЗАГРУЗКА ПЕРСОНАЖА (РАБОТАЕТ) ------
        const charFileInput = document.getElementById('charUpload');
        const soundFileInput = document.getElementById('soundUpload');
        
        // Перехватываем клик на лейбл для персонажа
        document.querySelectorAll('.file-label').forEach(label => {
            label.addEventListener('click', (e) => {
                const input = label.querySelector('input');
                if(input) input.click();
            });
        });
        
        charFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        characterImg = img;
                        redrawCanvas();
                        statusSpan.innerHTML = '✅ ПЕРСОНАЖ ЗАГРУЖЕН! ТЕПЕРЬ ЗАГРУЗИ ЗВУК.';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // ------ ЗАГРУЗКА ЗВУКА (ИСПРАВЛЕНО!) ------
        let loadedSoundSrc = null;
        soundFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                // Отзываем старый URL, если был
                if(voiceBlobUrl) {
                    URL.revokeObjectURL(voiceBlobUrl);
                }
                voiceBlobUrl = URL.createObjectURL(file);
                loadedSoundSrc = voiceBlobUrl;
                statusSpan.innerHTML = `🔊 ЗВУК ЗАГРУЖЕН: ${file.name} (БУДЕТ НА КАЖДУЮ БУКВУ)`;
                // тестовое воспроизведение для проверки
                const testAudio = new Audio(voiceBlobUrl);
                testAudio.volume = 0.3;
                testAudio.play().catch(e => console.log("тест звука", e));
            } else {
                statusSpan.innerHTML = '❌ НЕ УДАЛОСЬ ЗАГРУЗИТЬ ЗВУК';
            }
        });
        
        // ------ ФУНКЦИЯ ПРОИГРЫВАНИЯ ЗВУКА (ОДИН КЛИК) ------
        function playCustomSound() {
            if(!loadedSoundSrc) {
                statusSpan.innerHTML = '⚠️ СНАЧАЛА ЗАГРУЗИ ЗВУК (WAV/MP3)';
                return false;
            }
            try {
                // создаём новый Audio элемент для каждого проигрывания (чтобы можно было накладывать)
                const sound = new Audio(loadedSoundSrc);
                sound.volume = 1.0;
                sound.play().catch(err => {
                    console.warn("автоплей заблокирован?", err);
                    statusSpan.innerHTML = '⚠️ НАЖМИ НА СТРАНИЦУ, ЧТОБЫ РАЗРЕШИТЬ ЗВУК';
                });
                return true;
            } catch(e) {
                console.error(e);
                return false;
            }
        }
        
        // ------ ОСТАНОВИТЬ ВСЁ ------
        function stopAllLetters() {
            for(let t of activeTimeouts) clearTimeout(t);
            activeTimeouts = [];
            isPlaying = false;
            statusSpan.innerHTML = '⏹️ ОСТАНОВЛЕНО.';
            dialogueDiv.innerHTML = dialogueDiv.innerHTML; // сохраняем последний текст
        }
        
        // ------ ГЛАВНАЯ: ОЗВУЧКА ПО БУКВАМ ------
        function speakTextWithSound(text) {
            if(!text.trim()) {
                statusSpan.innerHTML = '✏️ ВВЕДИ ТЕКСТ!';
                return;
            }
            if(!loadedSoundSrc) {
                statusSpan.innerHTML = '❌ НЕТ ЗВУКА! ЗАГРУЗИ СВОЙ WAV/MP3 ФАЙЛ.';
                return;
            }
            if(!characterImg) {
                statusSpan.innerHTML = '⚠️ ЗАГРУЗИ ПЕРСОНАЖА, НО ЗВУК ВСЁ РАВНО БУДЕТ РАБОТАТЬ.';
            }
            
            stopAllLetters();
            isPlaying = true;
            
            // Отображаем текст в диалоговом окне
            dialogueDiv.innerHTML = text;
            
            let delay = 0;
            const speedMs = currentSpeed;
            
            for(let i = 0; i < text.length; i++) {
                const ch = text[i];
                // Пропускаем пробелы и знаки препинания? в undertale пауза, но звука нет
                if(ch === ' ' || ch === '.' || ch === ',' || ch === '!' || ch === '?' || ch === '-' || ch === ';') {
                    delay += speedMs * 1.1;
                    continue;
                }
                // Каждая буква (русская, английская, цифра) запускает звук
                const timeoutId = setTimeout(() => {
                    if(isPlaying) {
                        playCustomSound();
                        // Быстрая анимация "мигание рамки" для эффекта
                        redrawCanvas();
                        setTimeout(() => redrawCanvas(), 45);
                    }
                }, delay);
                activeTimeouts.push(timeoutId);
                delay += speedMs;
            }
            
            // Финальный таймер
            const endId = setTimeout(() => {
                isPlaying = false;
                statusSpan.innerHTML = '✅ ГОТОВО! МОЖНО СНОВА.';
                redrawCanvas();
            }, delay + 100);
            activeTimeouts.push(endId);
            
            statusSpan.innerHTML = `🎤 ОЗВУЧКА: КАЖДАЯ БУКВА = ТВОЙ ЗВУК (${speedMs} мс/букву)`;
        }
        
        // ------ НАСТРОЙКА СКОРОСТИ ------
        const speedSlider = document.getElementById('speedRange');
        const speedSpan = document.getElementById('speedValue');
        speedSlider.addEventListener('input', (e) => {
            currentSpeed = parseInt(e.target.value);
            speedSpan.innerText = currentSpeed + " мс";
        });
        
        // ------ КНОПКИ ------
        document.getElementById('speakBtn').addEventListener('click', () => {
            const inputField = document.getElementById('talkInput');
            const userText = inputField.value;
            if(!userText.trim()) {
                statusSpan.innerHTML = '❗ ВВЕДИ ТЕКСТ В ПОЛЕ!';
                return;
            }
            speakTextWithSound(userText);
        });
        
        document.getElementById('stopBtn').addEventListener('click', () => {
            stopAllLetters();
            redrawCanvas();
        });
        
        // Первоначальная отрисовка
        redrawCanvas();
        
        // Предупреждение про автоплей (чтобы пользователь кликнул)
        document.body.addEventListener('click', () => {
            if(loadedSoundSrc) {
                let silentTest = new Audio(loadedSoundSrc);
                silentTest.volume = 0;
                silentTest.play().then(() => {}).catch(e => {});
            }
        }, { once: true });
        
        // Дополнительно: подсказка
        statusSpan.innerHTML = '💾 1. ЗАГРУЗИ КАРТИНКУ → 2. ЗАГРУЗИ ЗВУК → 3. НАПИШИ ТЕКСТ → ОЗВУЧИТЬ';
    })();
</script>
</body>
</html>
